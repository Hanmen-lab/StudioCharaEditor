name: Build and Release

on:
  push:
	branches:
	  - master
	  - main
  pull_request:
	branches:
	  - master
	  - main

jobs:
  build:
	runs-on: windows-latest

	steps:
	- name: Checkout code
	  uses: actions/checkout@v4
	  with:
		fetch-depth: 0

	- name: Setup MSBuild
	  uses: microsoft/setup-msbuild@v1
	  with:
		vs-version: '17.0'

	- name: Setup NuGet
	  uses: nuget/setup-nuget@v1

	- name: Restore NuGet packages
	  run: nuget restore StudioCharaEditor.sln

	- name: Build Solution
	  run: msbuild StudioCharaEditor.sln /p:Configuration=Release /p:Platform="Any CPU"

	- name: Upload build artifacts
	  uses: actions/upload-artifact@v3
	  with:
		name: build-output
		path: bin/Release/
		retention-days: 30

	- name: Create Release on Tag
	  if: startsWith(github.ref, 'refs/tags/v')
	  uses: softprops/action-gh-release@v1
	  with:
		files: |
		  bin/Release/**/*.dll
		  bin/Release/**/*.pdb
		draft: false
		prerelease: false
		generate_release_notes: true
	  env:
		GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
