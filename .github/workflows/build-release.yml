name: Build and Release
on:
  push:
    branches:
      - master
      - main
    tags:
      - v*
  pull_request:
    branches:
      - master
      - main
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
        
      - name: Restore NuGet packages
        run: dotnet restore StudioCharaEditor.sln --configfile nuget.config --verbosity minimal
        
      - name: Build Solution
        run: dotnet build StudioCharaEditor.sln --configuration Release --no-restore
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: bin/Release/
          retention-days: 30
          
      - name: Create Release on Tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2  
        with:
          files: |
            bin/Release/**/*.dll
            bin/Release/**/*.pdb
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
